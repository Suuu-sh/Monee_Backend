services:
  - type: web
    name: monee-backend
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /readyz
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_DRIVER
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: AUTH_MODE
        value: guest
      - key: SEED_DEFAULT_CATEGORIES
        value: "true"
