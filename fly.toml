app = "monee-backend"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8080"
  DATABASE_DRIVER = "postgres"
  SEED_DEFAULT_CATEGORIES = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

[checks]
  [checks.health]
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/readyz"
    port = 8080

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
